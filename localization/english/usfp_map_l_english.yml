 setting_usa_initial_names_desc:0 "The country name of the United States will change based on government type, always retaining the initials "USA""
 setting_usa_dynamic_names:1 "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_usa_dynamic_names_desc #high Dynamic #!#!#!"
 setting_usa_dynamic_names_desc:0 "The country name of the United States will change based on government type"

rule_usfp_native_consolidation:0 "@america_icon! #yellow Hail, Columbia!#! | Decentralized Consolidation"
setting_some_native_consolidation:1 "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_some_native_consolidation_desc #high Some #!#!#!"
setting_some_native_consolidation_desc:0 "Some [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')] in North America will be consolidated on game start. #lore For use in case of potential performance issues.#!"
setting_more_native_consolidation:1 "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_more_native_consolidation_desc #high More #!#!#!"
setting_more_native_consolidation_desc:0 "Even more [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')] in North America will be consolidated on game start. #lore For use in case of potential performance issues.#!"
setting_no_native_consolidation:1 "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_no_native_consolidation_desc #high None #!#!#!"
setting_no_native_consolidation_desc:0 "None of the Mod-Added [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')] in North America will be consolidated on game start."

rule_usfp_african_consolidation: "@america_icon! #yellow Hail, Columbia!#! | African Consolidation"
setting_african_consolidation: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_african_consolidation_desc #high Yes #!#!#!"
setting_african_consolidation_desc: "Consolidates some [Concept('concept_country', '$concept_countries$')] in Central Africa at game start to reduce the starting number of tags below 420."
setting_no_african_consolidation: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_african_consolidation_desc #high No #!#!#!"
setting_no_african_consolidation_desc: "African [Concept('concept_country', '$concept_countries$')] are unchanged."


